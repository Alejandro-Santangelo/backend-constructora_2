# Configuración para pruebas automatizadas
# Base de datos para pruebas (Testcontainers manejará PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/test_db
spring.datasource.username=test
spring.datasource.password=test
spring.jpa.hibernate.ddl-auto=create-drop

# Configuración de logging para pruebas
logging.level.com.rodrigo.construccion=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Desactivar features no necesarios en pruebas
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security para pruebas
jwt.secret=test-secret-key-for-testing-only-not-production
jwt.expiration=3600000

# Configuración específica para pruebas
management.endpoints.web.exposure.include=health,info