# =====================================================
# CONFIGURACIÓN ULTRA-SEGURA PARA BD EXISTENTE
# =====================================================
# Esta configuración NO toca el schema en absoluto

# Tu base de datos existente
spring.datasource.url=jdbc:postgresql://localhost:5432/mi_bd_existente
spring.datasource.username=tu_usuario
spring.datasource.password=tu_password

# NO toca el schema para nada
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Solo lee datos, no modifica estructura
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Configuración de solo lectura (opcional)
# spring.datasource.hikari.read-only=true

# Puerto diferente
server.port=8082