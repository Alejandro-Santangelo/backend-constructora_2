server.port=${PORT:8080}

# Base de datos PostgreSQL Railway
spring.datasource.url=jdbc:postgresql://caboose.proxy.rlwy.net:16821/construccion_app_v3?sslmode=require&connectTimeout=10&socketTimeout=30
spring.datasource.username=postgres
spring.datasource.password=HYOJMbsvtyqHmrszxCBiqPSIOEkDIBdi
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP ultra-minimal
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000

# Hibernate - SOLO VALIDAR
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# DESACTIVAR TODO LO NO ESENCIAL
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.flyway.enabled=false

# DESACTIVAR SPRINGDOC/SWAGGER COMPLETAMENTE
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Actuator - SOLO health
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging MÍNIMO
logging.level.root=WARN
logging.level.com.rodrigo.construccion=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{HH:mm:ss} - %msg%n

# Multi-Tenant
app.tenant.header-name=X-Tenant-ID
app.tenant.default-schema=public

# JWT
app.jwt.secret=MiClaveSecretaMuySeguraParaJWTQueDebeSerMuyLargaYCompleja123456789
