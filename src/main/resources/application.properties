# Configuración de la Base de Datos PostgreSQL
# IMPORTANTE: Las variables de entorno PSQL_USER y PSQL_PASSWORD deben configurarse en Windows
# Para configurar en Windows PowerShell (como administrador):
# [System.Environment]::SetEnvironmentVariable('PSQL_USER', 'postgres', 'User')
# [System.Environment]::SetEnvironmentVariable('PSQL_PASSWORD', 'Cacho3103', 'User')

# BASE DE DATOS V2 - Estructura limpia con nombres consistentes
spring.datasource.url=jdbc:postgresql://localhost:5432/construccion_app_v3
spring.datasource.username=${PSQL_USER}
spring.datasource.password=${PSQL_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración JPA/Hibernate - GENERACIÓN DDL TEMPORAL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Deshabilitar Flyway para permitir que Hibernate genere el esquema desde cero en la nueva DB
spring.flyway.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration


#spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.hibernate.ddl-auto=create (borra datos)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Configuración de la aplicación
server.port=8080

# ========== CONFIGURACIÓN GLOBAL DE JACKSON (FECHAS) ==========
# Formato de fechas: yyyy-MM-dd (ej: 2025-12-10)
spring.jackson.date-format=yyyy-MM-dd
# Zona horaria por defecto (importante para consistencia)
spring.jackson.time-zone=America/Argentina/Buenos_Aires
# NO usar timestamps numéricos para fechas (usar strings ISO-8601)
spring.jackson.serialization.write-dates-as-timestamps=false
# Registrar módulo JavaTimeModule para LocalDate/LocalDateTime
spring.jackson.serialization.write-dates-with-zone-id=false
# NO fallar si hay propiedades desconocidas en JSON
spring.jackson.deserialization.fail-on-unknown-properties=false
# Ser flexible con tipos de datos
spring.jackson.deserialization.accept-single-value-as-array=true

# Configuración de carga de archivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT Configuration
app.jwt.secret=MiClaveSecretaMuySeguraParaJWTQueDebeSerMuyLargaYCompleja123456789
app.jwt.expiration=86400000

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.doc-expansion=none
# Evitar duplicación de context-path en Swagger
springdoc.swagger-ui.disable-swagger-default-url=true
# Configurar el servidor predeterminado para evitar duplicación
springdoc.swagger-ui.use-root-path=true

# Logging
logging.level.com.rodrigo.construccion=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Configuración Multi-Tenant
app.tenant.header-name=X-Tenant-ID
app.tenant.default-schema=public

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Spring Boot DevTools - Configuración para hot reload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.restart.exclude=static/**,public/**,resources/**

# Polling interval para cambios (en milisegundos)
spring.devtools.restart.poll-interval=1000
spring.devtools.restart.quiet-period=400

# Configuración Flyway para migraciones
# Se recomienda que Flyway use las mismas credenciales que el datasource principal.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public