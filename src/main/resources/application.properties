server.port=8080
# BASE DE DATOS V2 - Estructura limpia con nombres consistentes
spring.datasource.url=jdbc:postgresql://localhost:5432/construccion_app_v3?characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=${PSQL_USER}
spring.datasource.password=${PSQL_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Forzar UTF-8 en la conexión JDBC
spring.datasource.hikari.connection-init-sql=SET CLIENT_ENCODING TO 'UTF8'

# Hibernate solo valida, no modifica el esquema
spring.jpa.hibernate.ddl-auto=none

# Flyway deshabilitado temporalmente (esquema ya actualizado por Hibernate)
# Las migraciones V33 y V34 fueron aplicadas via Hibernate ddl-auto=update
# TODO: Sincronizar flyway_schema_history con migraciones aplicadas

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true


# Forzar UTF-8 en respuestas HTTP
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# ========== CONFIGURACIÓN GLOBAL DE JACKSON (FECHAS) ==========
# Formato de fechas: yyyy-MM-dd (ej: 2025-12-10)
spring.jackson.date-format=yyyy-MM-dd
# Zona horaria por defecto (importante para consistencia)
spring.jackson.time-zone=America/Argentina/Buenos_Aires
# NO usar timestamps numéricos para fechas (usar strings ISO-8601)
spring.jackson.serialization.write-dates-as-timestamps=false
# Registrar módulo JavaTimeModule para LocalDate/LocalDateTime
spring.jackson.serialization.write-dates-with-zone-id=false
# NO fallar si hay propiedades desconocidas en JSON
spring.jackson.deserialization.fail-on-unknown-properties=false
# Ser flexible con tipos de datos
spring.jackson.deserialization.accept-single-value-as-array=true

# Configuración de carga de archivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT Configuration
app.jwt.secret=MiClaveSecretaMuySeguraParaJWTQueDebeSerMuyLargaYCompleja123456789
app.jwt.expiration=86400000

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.doc-expansion=none
# Evitar duplicación de context-path en Swagger
springdoc.swagger-ui.disable-swagger-default-url=true
# Configurar el servidor predeterminado para evitar duplicación
springdoc.swagger-ui.use-root-path=true

# Logging
logging.level.com.rodrigo.construccion=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Configuración Multi-Tenant
app.tenant.header-name=X-Tenant-ID
app.tenant.default-schema=public

# CRÍTICO: Habilitar HibernateFilterInterceptor para multi-tenancy
app.hibernate-filter-interceptor.enabled=true

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Spring Boot DevTools - Configuración para hot reload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.restart.exclude=static/**,public/**,resources/**

# Polling interval para cambios (en milisegundos)
spring.devtools.restart.poll-interval=1000
spring.devtools.restart.quiet-period=400

# Configuración Flyway - DESHABILITADO (migraciones V33 y V34 ya aplicadas)
# V33 y V34 registradas en flyway_schema_history
# Migraciones antiguas (V7-V32) ya aplicadas por Hibernate
spring.flyway.enabled=false

# ========== CONFIGURACIÓN DE REPORTES DEL SISTEMA ==========
# Directorios para almacenar reportes de auditoría y backups
# Estos directorios son accesibles desde el endpoint /api/reportes-sistema
reportes.auditoria.directorio=reportes-auditoria
reportes.backup.directorio=db-backups