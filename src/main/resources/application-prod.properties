# ==================================================
# CONFIGURACION RENDER - MODO MINIMAL
# ==================================================

server.port=${PORT:8080}

# Base de datos PostgreSQL Render - parseando DATABASE_URL
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://localhost:5432/railway}?sslmode=require&connectTimeout=10&socketTimeout=30
spring.datasource.username=${PSQL_USER:postgres}
spring.datasource.password=${PSQL_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP minimal
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000

# Hibernate - VALIDATE (no modificar esquema)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# DESACTIVAR todo lo innecesario
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.flyway.enabled=false

# DESACTIVAR HibernateFilterInterceptor (causa hang con 61 repos)
app.hibernate-filter-interceptor.enabled=false

# SWAGGER/SPRINGDOC DESACTIVADO COMPLETAMENTE
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Actuator mínimo
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging MINIMAL
logging.level.root=WARN
logging.level.com.rodrigo.construccion=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{HH:mm:ss} - %msg%n

# Multi-Tenant
app.tenant.header-name=X-Tenant-ID
app.tenant.default-schema=public

# JWT
app.jwt.secret=MiClaveSecretaMuySeguraParaJWTQueDebeSerMuyLargaYCompleja123456789
app.jwt.expiration=86400000

# CORS - SIN CONFIGURACIÓN (controlado por código)
# app.cors.allowed-origins será manejado por CorsConfig.java

# UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
