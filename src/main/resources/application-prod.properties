# ==================================================
# CONFIGURACION PRODUCCION - RAILWAY
# ==================================================

server.port=${PORT:8080}

# Base de datos PostgreSQL Railway
spring.datasource.url=jdbc:postgresql://caboose.proxy.rlwy.net:16821/construccion_app_v3?characterEncoding=UTF-8&useUnicode=true&sslmode=require
spring.datasource.username=postgres
spring.datasource.password=HYOJMbsvtyqHmrszxCBiqPSIOEkDIBdi
spring.datasource.driver-class-name=org.postgresql.Driver

# Forzar UTF-8 en la conexión JDBC
spring.datasource.hikari.connection-init-sql=SET CLIENT_ENCODING TO 'UTF8'

# Hibernate solo valida, no modifica el esquema
spring.jpa.hibernate.ddl-auto=none

# Desactivar SQL logging en producción
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Forzar UTF-8 en respuestas HTTP
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# Configuración de Jackson (fechas)
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=America/Argentina/Buenos_Aires
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-dates-with-zone-id=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.accept-single-value-as-array=true

# Configuración de carga de archivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CORS - Permitir frontend Railway
app.cors.allowed-origins=https://frontend-constructora2-production.up.railway.app
