# ==================================================
# CONFIGURACION PRODUCCION - RAILWAY
# ==================================================

server.port=${PORT:8080}

# Base de datos PostgreSQL Railway
spring.datasource.url=jdbc:postgresql://caboose.proxy.rlwy.net:16821/construccion_app_v3?characterEncoding=UTF-8&useUnicode=true&sslmode=require&connectTimeout=30&socketTimeout=60
spring.datasource.username=postgres
spring.datasource.password=HYOJMbsvtyqHmrszxCBiqPSIOEkDIBdi
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración HikariCP optimizada para Railway
spring.datasource.hikari.connection-init-sql=SET CLIENT_ENCODING TO 'UTF8'
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# Hibernate - Solo validación, sin modificar esquema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# DESACTIVAR Spring DevTools en producción
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# DESACTIVAR Flyway (ya está desactivado pero lo confirmamos)
spring.flyway.enabled=false

# UTF-8 en respuestas HTTP
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# Jackson (fechas)
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=America/Argentina/Buenos_Aires
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-dates-with-zone-id=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.accept-single-value-as-array=true

# Carga de archivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Springdoc/Swagger - Optimizado para producción
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.packagesToScan=com.rodrigo.construccion.controller
springdoc.pathsToMatch=/api/**

# Actuator - Health check para Railway
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.defaults.enabled=true

# Logging optimizado para Railway
logging.level.root=INFO
logging.level.com.rodrigo.construccion=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Multi-Tenant
app.tenant.header-name=X-Tenant-ID
app.tenant.default-schema=public

# JWT
app.jwt.secret=${JWT_SECRET:MiClaveSecretaMuySeguraParaJWTQueDebeSerMuyLargaYCompleja123456789}
app.jwt.expiration=86400000

# CORS - Frontend Railway
app.cors.allowed-origins=https://frontend-constructora2-production.up.railway.app
