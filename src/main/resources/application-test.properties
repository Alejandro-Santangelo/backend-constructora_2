# =====================================================
# CONFIGURACIÓN PARA PRUEBAS EN OTRA BASE DE DATOS
# =====================================================
# Usa este perfil para probar sin modificar tablas existentes
# Comando: mvn spring-boot:run -Dspring-boot.run.profiles=test

# Base de datos de prueba (cambiar según tus necesidades)
spring.datasource.url=jdbc:postgresql://localhost:5432/mi_bd_de_prueba
spring.datasource.username=postgres
spring.datasource.password=Cacho3103

# IMPORTANTE: Solo valida, NO modifica tablas
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Configuración específica para pruebas
logging.level.com.rodrigo.construccion=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Puerto diferente para no interferir con desarrollo
server.port=8081